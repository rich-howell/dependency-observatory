<!doctype html>
<html>
  <head>
    <title>Dependency Observatory</title>

    <style>
      body {
        font-family: system-ui;
        background: #0f172a;
        color: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px;
        border-bottom: 1px solid #334155;
      }

      .green {
        color: #22c55e;
      }
      .yellow {
        color: #eab308;
      }
      .red {
        color: #ef4444;
      }
    </style>
  </head>

  <body>
    <h1>🛰 Dependency Observatory</h1>

    <p id="summary"></p>

    <table id="repos">
      <thead>
        <tr>
          <th>Repo</th>
          <th>Stack</th>
          <th>Dependencies</th>
          <th>Security</th>
          <th>Updates</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>

    <script>
      async function load() {
        const summary = document.getElementById("summary");
        const tbody = document.querySelector("#repos tbody");

        try {
          const response = await fetch("./dashboard.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          const repos = Array.isArray(data.repos) ? data.repos : [];

          summary.innerText = `Repos: ${repos.length}`;

          repos.forEach((repo) => {
            let row = document.createElement("tr");

            row.innerHTML = `
<td>
<a href="https://github.com/${repo.repo}" target="_blank">
${repo.repo}
</a>
</td>

<td>${repo.stack}</td>

<td>${repo.dependencies ? "📦" : "-"}</td>

<td class="${repo.alert_count > 0 ? "red" : "green"}">
${repo.alert_count ?? 0}
</td>

<td class="${repo.updates > 0 ? "yellow" : "green"}">
${repo.updates ?? 0}
</td>

<td class="${repo.actions > 0 ? "yellow" : "green"}">
${repo.actions ?? 0}
</td>
`;

            tbody.appendChild(row);
          });
        } catch (error) {
          summary.innerText = `Unable to load dashboard data: ${error.message}`;
        }
      }

      load();
    </script>
  </body>
</html>
