<!doctype html>
<html>
  <head>
    <title>Dependency Observatory</title>

    <style>
      :root {
        --bg: #08132b;
        --panel: #0f1c3f;
        --row-alt: #0b1733;
        --border: #2b3d68;
        --text: #f3f7ff;
        --muted: #c6d4f2;
        --link: #8bd3ff;
        --link-visited: #c7b6ff;
        --link-hover: #d6f0ff;
        --ok: #4ade80;
        --warn: #facc15;
        --danger: #f87171;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #07112a 0%, var(--bg) 100%);
        color: var(--text);
        line-height: 1.4;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      th {
        color: var(--muted);
        font-weight: 700;
        letter-spacing: 0.01em;
        text-align: left;
      }

      tbody tr:nth-child(even) {
        background: var(--row-alt);
      }

      tbody tr:hover {
        background: #16264d;
      }

      a,
      a:visited {
        color: var(--link);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      a:visited {
        color: var(--link-visited);
      }

      a:hover,
      a:focus-visible {
        color: var(--link-hover);
        text-decoration-thickness: 2px;
      }

      a:focus-visible {
        outline: 2px solid var(--link-hover);
        outline-offset: 2px;
        border-radius: 2px;
      }

      #summary {
        color: var(--muted);
        margin-bottom: 14px;
      }

      #repos td:first-child a {
        word-break: break-word;
      }

      .green {
        color: var(--ok);
      }
      .yellow {
        color: var(--warn);
      }
      .red {
        color: var(--danger);
      }
    </style>
  </head>

  <body>
    <h1>🛰 Dependency Observatory</h1>

    <p id="summary"></p>

    <table id="repos">
      <thead>
        <tr>
          <th>Org</th>
          <th>Repo</th>
          <th>Stack</th>
          <th>Dependencies</th>
          <th>Security</th>
          <th>Updates</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>

    <script>
      async function load() {
        const summary = document.getElementById("summary");
        const tbody = document.querySelector("#repos tbody");

        try {
          const response = await fetch("./dashboard.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          const repos = Array.isArray(data.repos) ? data.repos : [];
          repos.sort((a, b) => {
            const orgA = (a.org || (a.repo || "").split("/")[0] || "").toLowerCase();
            const orgB = (b.org || (b.repo || "").split("/")[0] || "").toLowerCase();
            if (orgA !== orgB) return orgA.localeCompare(orgB);

            const repoA = (a.repo || "").toLowerCase();
            const repoB = (b.repo || "").toLowerCase();
            return repoA.localeCompare(repoB);
          });

          summary.innerText = `Repos: ${repos.length}`;

          repos.forEach((repo) => {
            let row = document.createElement("tr");
            const org = repo.org || (repo.repo || "").split("/")[0] || "Unknown";

            row.innerHTML = `
<td>${org}</td>
<td>
<a href="https://github.com/${repo.repo}" target="_blank" rel="noopener noreferrer">
${repo.repo}
</a>
</td>

<td>${repo.stack}</td>

<td>${repo.dependencies ? "📦" : "-"}</td>

<td class="${repo.alert_count > 0 ? "red" : "green"}">
${repo.alert_count ?? 0}
</td>

<td class="${repo.updates > 0 ? "yellow" : "green"}">
${repo.updates ?? 0}
</td>

<td class="${repo.actions > 0 ? "yellow" : "green"}">
${repo.actions ?? 0}
</td>
`;

            tbody.appendChild(row);
          });
        } catch (error) {
          summary.innerText = `Unable to load dashboard data: ${error.message}`;
        }
      }

      load();
    </script>
  </body>
</html>
