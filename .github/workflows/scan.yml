name: Dependency Observatory

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python collector/collect_dependabot.py

      - name: Generate dashboard
        run: python dashboard/generate_dashboard.py

      - name: Commit results
        run: |
          git config --global user.name "dependency-bot"
          git config --global user.email "actions@github.com"

          git add data/alerts.json dashboard.md

          git commit -m "Update dependency dashboard" || echo "No changes"

          git push